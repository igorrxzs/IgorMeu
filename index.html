<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Sistema de Gerenciamento</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="container">
                <div class="header-content">
                    <div class="logo">
                        <i class="fas fa-tasks"></i>
                        <h1>TaskFlow</h1>
                    </div>
                    <nav class="nav">
                        <button class="nav-btn active" data-tab="products">
                            <i class="fas fa-box"></i>
                            Produtos
                        </button>
                        <button class="nav-btn" data-tab="orders">
                            <i class="fas fa-shopping-cart"></i>
                            Pedidos
                        </button>
                        <button class="nav-btn" data-tab="analytics">
                            <i class="fas fa-chart-bar"></i>
                            Analytics
                        </button>
                    </nav>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <div class="container">
                <!-- Products Tab -->
                <div class="tab-content active" id="products">
                    <div class="section-header">
                        <h2>Gerenciamento de Produtos</h2>
                        <button class="btn btn-primary" id="addProductBtn">
                            <i class="fas fa-plus"></i>
                            Adicionar Produto
                        </button>
                    </div>

                    <!-- Search and Filters -->
                    <div class="filters">
                        <div class="search-box">
                            <i class="fas fa-search"></i>
                            <input type="text" id="searchInput" placeholder="Buscar produtos...">
                        </div>
                        <div class="filter-options">
                            <select id="sortSelect">
                                <option value="name">Ordenar por Nome</option>
                                <option value="price">Ordenar por Preço</option>
                                <option value="id">Ordenar por ID</option>
                            </select>
                        </div>
                    </div>

                    <!-- Products Grid -->
                    <div class="products-grid" id="productsGrid">
                        <!-- Products will be loaded here -->
                    </div>
                </div>

                <!-- Orders Tab -->
                <div class="tab-content" id="orders">
                    <div class="section-header">
                        <h2>Pedidos</h2>
                    </div>
                    <div class="empty-state">
                        <i class="fas fa-shopping-cart"></i>
                        <h3>Nenhum pedido encontrado</h3>
                        <p>Os pedidos aparecerão aqui quando forem criados.</p>
                    </div>
                </div>

                <!-- Analytics Tab -->
                <div class="tab-content" id="analytics">
                    <div class="section-header">
                        <h2>Analytics</h2>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card">
                            <div class="stat-icon">
                                <i class="fas fa-box"></i>
                            </div>
                            <div class="stat-content">
                                <h3 id="totalProducts">0</h3>
                                <p>Total de Produtos</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">
                                <i class="fas fa-dollar-sign"></i>
                            </div>
                            <div class="stat-content">
                                <h3 id="avgPrice">R$ 0,00</h3>
                                <p>Preço Médio</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">
                                <i class="fas fa-tag"></i>
                            </div>
                            <div class="stat-content">
                                <h3 id="maxPrice">R$ 0,00</h3>
                                <p>Preço Máximo</p>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon">
                                <i class="fas fa-tag"></i>
                            </div>
                            <div class="stat-content">
                                <h3 id="minPrice">R$ 0,00</h3>
                                <p>Preço Mínimo</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div class="modal" id="productModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Adicionar Produto</h3>
                <button class="close-btn" id="closeModal">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <form id="productForm">
                <div class="form-group">
                    <label for="productName">Nome do Produto</label>
                    <input type="text" id="productName" required>
                </div>
                <div class="form-group">
                    <label for="productPrice">Preço</label>
                    <input type="number" id="productPrice" step="0.01" min="0" required>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" id="cancelBtn">Cancelar</button>
                    <button type="submit" class="btn btn-primary" id="saveBtn">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Carregando...</p>
        </div>
    </div>

    <!-- Toast Notifications -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
